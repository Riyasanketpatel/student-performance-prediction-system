<!DOCTYPE html>
<html>

<head>
<title>Upload Dataset</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

/* center page */
.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* upload card */
.upload-box{
width:420px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-align:center;
}

/* title */
.upload-box h2{
margin-bottom:25px;
color:#333;
}

/* upload area */
.upload-area{
display:block;
border:2px dashed #d1d5db;
border-radius:10px;
padding:35px;
cursor:pointer;
background:white;
transition:0.3s;
font-size:16px;
}

.upload-area:hover{
border-color:#3b82f6;
background:#f8fbff;
}

/* hide default file input */
input[type="file"]{
display:none;
}

/* supported text */
.support-text{
margin-top:12px;
font-size:13px;
color:#6b7280;
}

/* selected file text */
.file-name{
margin-top:10px;
font-size:14px;
color:#333;
}

/* button */
button{
margin-top:25px;
padding:12px 25px;
background:#3b82f6;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2563eb;
}

.dataset-info{
margin-top:25px;
background:#f9fafb;
border:1px solid #e5e7eb;
padding:18px;
border-radius:8px;
text-align:left;
}

.dataset-info strong{
display:block;
margin-bottom:10px;
font-size:14px;
color:#333;
}

.dataset-info ul{
padding-left:18px;
margin:0;
}

.dataset-info li{
font-size:13px;
color:#555;
margin-bottom:6px;
}

</style>
</head>


<body>

<div class="container">

<div class="upload-box">

<h2 style="position:relative;">
<a href="/upload" style="position:absolute; left:0px; text-decoration:none; color:#333; font-size:26px; font-weight:bold;">⮜</a>
Upload Student Dataset
</h2>

<form action="/upload_csv" method="POST" enctype="multipart/form-data">

<label class="upload-area">
<strong>Click to choose file</strong>
<br>
<span style="font-size:13px;color:#6b7280;">or drag and drop</span>

<input type="file" name="dataset" id="fileInput" required>
</label>

<p class="support-text">
Supported formats: CSV, XLSX
</p>

<div class="file-name" id="fileName">
No file selected
</div>

<button type="submit">
Upload Dataset
</button>

</form>

<div class="dataset-info">

<strong>Dataset Requirements:</strong>

<ul>
<li>study_hours_per_day</li>
<li>attendance_percentage</li>
<li>screen_time</li>
<li>entertainment_hours</li>
<li>stress_level</li>
<li>exam_anxiety</li>
<li>previous_gpa</li>
<li>motivation_level</li>
<li>major (optional)</li>
</ul>

</div>
</div>

</div>


<script>

/* show selected file name */

document.getElementById("fileInput").addEventListener("change", function(){

if(this.files.length > 0){

document.getElementById("fileName").innerText =
"Selected: " + this.files[0].name;

}

});

</script>


</body>
</html>
