<!DOCTYPE html>
<html>
<head>
<title>Data Preprocessing</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

.container{
    width:80%;
    margin:auto;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:40px;
}

.row{
    display:flex;
    justify-content:space-around;
    margin-bottom:40px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    width:40%;
    text-align:center;
    box-shadow:0px 2px 8px rgba(0,0,0,0.1);
}

.stat{
    font-size:18px;
    margin:10px 0;
}

button{
    padding:12px 25px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

.center{
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Data Preprocessing Summary</h1>

<div class="row">

<div class="card">
<h2>Before Preprocessing</h2>

<p class="stat"><b>Total Rows:</b> {{ before_rows }}</p>
<p class="stat"><b>Total Columns:</b> {{ before_cols }}</p>
<p class="stat"><b>Missing Values:</b> {{ before_missing }}</p>

</div>

<div class="card">
<h2>After Preprocessing</h2>

<p class="stat"><b>Total Rows:</b> {{ after_rows }}</p>
<p class="stat"><b>Total Columns:</b> {{ after_cols }}</p>
<p class="stat"><b>Missing Values:</b> {{ after_missing }}</p>

</div>

</div>

<div class="center">

<a href="/dashboard">
<button>Confirm and Continue</button>
</a>

</div>

</div>

</body>
</html>
