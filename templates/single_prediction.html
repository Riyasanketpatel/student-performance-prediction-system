<!DOCTYPE html>
<html>

<head>
<title>Single Student Prediction</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

.container{
width:60%;
margin:auto;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0px 3px 10px rgba(0,0,0,0.1);
}

.form-group{
margin-bottom:15px;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.back{
position:absolute;
left:20px;
top:20px;
font-size:26px;
text-decoration:none;
color:#333;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2 style="position:relative; text-align:center;">
<a href="/prediction" style="position:absolute; left:20px; text-decoration:none; color:#333; font-size:26px; font-weight:bold">⮜</a>
<h1>Single Student Prediction</h1>

<div class="card">

<form action="/predict_single" method="POST">

<div class="form-group">
<label>Name</label>
<input type="text" name="name" placeholder="Enter student name" required>
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option>Female</option>
<option>Male</option>
</select>
</div>

<div class="form-group">
<label>Study Hours Per Day</label>
<input type="number" step="0.1" name="study_hours_per_day" placeholder="e.g. 4.5" required>
</div>

<div class="form-group">
<label>Attendance Percentage</label>
<input type="number" step="0.1" name="attendance_percentage" placeholder="e.g. 85" required>
</div>

<div class="form-group">
<label>Previous GPA</label>
<input type="number" step="0.1" min="0" max="10" name="previous_gpa" placeholder="0 - 10 scale" required>
</div>

<div class="form-group">
<label>Screen Time (Hours)</label>
<input type="number" step="0.1" name="screen_time" placeholder="e.g. 5">
</div>

<div class="form-group">
<label>Entertainment Hours</label>
<input type="number" step="0.1" name="entertainment_hours" placeholder="e.g. 2">
</div>

<div class="form-group">
<label>Stress Level (0-10)</label>
<input type="number" step="0.1" name="stress_level">
</div>

<div class="form-group">
<label>Exam Anxiety (0-10)</label>
<input type="number" step="0.1" name="exam_anxiety_score">
</div>

<div class="form-group">
<label>Motivation Level (0-10)</label>
<input type="number" step="0.1" name="motivation_level">
</div>

<div class="form-group">
<label>Major</label>
<select name="major">
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
<option>Engineering</option>
<option>Business</option>
</select>
</div>

<button type="submit">Predict Score</button>

</form>

</div>

</div>

</body>
</html>
