<!DOCTYPE html>
<html>
<head>
<title>Edit Student</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.container{
width:60%;
margin:auto;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0px 3px 10px rgba(0,0,0,0.1);
}

.form-group{
margin-bottom:15px;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#28a745;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e7e34;
}

</style>
</head>

<body>

<div class="container">

<h1 style="position:relative; text-align:center;">
<a href="/upload" style="position:absolute; left:20px; text-decoration:none; color:#333; font-size:26px; font-weight:bold;">⮜</a>
Edit Student
</h1>

<div class="card">

<form action="/update_student/{{index}}" method="POST">

<div class="form-group">
<label>Name</label>
<input type="text" name="name" value="{{ student['name'] }}" required>
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option {{'selected' if student.gender=='Female'}}>Female</option>
<option {{'selected' if student.gender=='Male'}}>Male</option>
</select>
</div>

<div class="form-group">
<label>Study Hours Per Day</label>
<input type="number" step="any" name="study_hours_per_day" value="{{student.study_hours_per_day}}">
</div>

<div class="form-group">
<label>Attendance Percentage</label>
<input type="number" step="any" name="attendance_percentage" value="{{student.attendance_percentage}}">
</div>

<div class="form-group">
<label>Screen Time Hours</label>
<input type="number" step="any" name="screen_time_hours" value="{{student.screen_time_hours}}">
</div>

<div class="form-group">
<label>Entertainment Hours</label>
<input type="number" step="any" name="entertainment_hours" value="{{student.entertainment_hours}}">
</div>

<div class="form-group">
<label>Stress Level</label>
<input type="number" step="any" name="stress_level" value="{{student.stress_level}}">
</div>

<div class="form-group">
<label>Motivation Level</label>
<input type="number" step="any" name="motivation_level" value="{{student.motivation_level}}">
</div>

<div class="form-group">
<label>Exam Anxiety</label>
<input type="number" step="any" name="exam_anxiety" value="{{student.exam_anxiety}}">
</div>

<div class="form-group">
<label>Major</label>
<select name="major">
<option {{'selected' if student.major=='Science'}}>Science</option>
<option {{'selected' if student.major=='Commerce'}}>Commerce</option>
<option {{'selected' if student.major=='Arts'}}>Arts</option>
<option {{'selected' if student.major=='Engineering'}}>Engineering</option>
<option {{'selected' if student.major=='Business'}}>Business</option>
</select>
</div>

<div class="form-group">
<label>Exam Score</label>
<input type="number" step="any" name="exam_score" value="{{student.exam_score}}">
</div>

<button type="submit">Update Student</button>

</form>

</div>

</div>

</body>
</html>
