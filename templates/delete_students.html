<!DOCTYPE html>
<html>

<head>
<title>Delete Students</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.container{
width:90%;
margin:auto;
padding:40px;
}

h2{
text-align:center;
margin-bottom:30px;
}

.delete-dataset{
background:red;
color:white;
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#007bff;
color:white;
}

.btn-delete{
background:#dc3545;
color:white;
border:none;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

.back{
position:absolute;
left:20px;
top:20px;
font-size:26px;
text-decoration:none;
color:#333;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">
    
<h2 style="position:relative; text-align:center;">
<a href="/upload"style="position:absolute; left:20px; text-decoration:none; color:#333; font-size:26px; font-weight:bold;">⮜</a>
<h2>Delete Students</h2>

<a href="/delete_dataset">
<button class="delete-dataset">Delete Entire Dataset</button>
</a>

<table>

<tr>
<th>Name</th>
<th>Study Hours</th>
<th>Attendance</th>
<th>Score</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>

<td>{{s.name}}</td>
<td>{{s.study_hours_per_day}}</td>
<td>{{s.attendance_percentage}}</td>
<td>{{s.exam_score}}</td>

<td>
<a href="/delete_student/{{loop.index0}}">
<button class="btn-delete">Delete</button>
</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
