<!DOCTYPE html>
<html>
<head>
<title>Student Data Entry</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

.container{
width:60%;
margin:auto;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0px 3px 10px rgba(0,0,0,0.1);
}

.form-group{
margin-bottom:15px;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>
</head>

<body>

<div class="container">

<h2 style="position:relative;">
<a href="/upload" style="position:absolute; left:0px; text-decoration:none; color:#333; font-size:26px; font-weight:bold;">⮜</a>
<h1>Student Data Entry</h1>

<div class="card">

<form action="/save_student" method="POST">

<div class="form-group">
<label>Name</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option>Female</option>
<option>Male</option>
</select>
</div>

<div class="form-group">
<label>Study Hours Per Day</label>
<input type="number" step="0.1" name="study_hours_per_day" required>
</div>

<div class="form-group">
<label>Attendance Percentage</label>
<input type="number" step="0.1" name="attendance_percentage" required>
</div>

<div class="form-group">
<label>Screen Time (Hours)</label>
<input type="number" step="0.1" name="screen_time_hours">
</div>

<div class="form-group">
<label>Entertainment Hours</label>
<input type="number" step="0.1" name="entertainment_hours">
</div>

<div class="form-group">
<label>Stress Level</label>
<input type="number" step="0.1" name="stress_level">
</div>

<div class="form-group">
<label>Motivation Level</label>
<input type="number" step="0.1" name="motivation_level">
</div>

<div class="form-group">
<label>Exam Anxiety</label>
<input type="number" step="0.1" name="exam_anxiety">
</div>

<div class="form-group">
<label>Major</label>
<select name="major">
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
<option>Engineering</option>
<option>Business</option>
</select>
</div>

<div class="form-group">
<label>Exam Score</label>
<input type="number" step="0.1" name="exam_score">
</div>

<button type="submit">Save Student Data</button>

</form>

</div>

</div>

</body>
</html>
