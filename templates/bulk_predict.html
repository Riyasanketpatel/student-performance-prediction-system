<!DOCTYPE html>

<html>

<head>
<title>Bulk Prediction Result</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.result-box{
width:460px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-align:center;
}

.result-box h2{
margin-bottom:15px;
color:#333;
}

.result-box p{
color:#555;
font-size:15px;
}

button{
margin-top:25px;
padding:12px 25px;
background:#22c55e;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#16a34a;
}

.back-btn{
position:absolute;
left:20px;
text-decoration:none;
color:#333;
font-size:26px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="result-box">

<h2 style="position:relative;">
<a href="/prediction" class="back-btn">⮜</a>
Prediction Completed
</h2>

<p>Your dataset has been successfully processed.</p>
<p>The predicted exam scores are ready to download.</p>

<button onclick="downloadFile()">
Download Result File
</button>

</div>

</div>


<script>

function downloadFile(){

    window.location.href="/download_result";

    showToast("Prediction file downloaded successfully");

}

function showToast(message){

    let toast=document.createElement("div");

    toast.innerText=message;

    toast.style.position="fixed";
    toast.style.top="20px";
    toast.style.right="20px";
    toast.style.background="#22c55e";
    toast.style.color="white";
    toast.style.padding="12px 18px";
    toast.style.borderRadius="6px";
    toast.style.boxShadow="0px 3px 10px rgba(0,0,0,0.2)";
    toast.style.zIndex="9999";
    toast.style.fontSize="14px";

    document.body.appendChild(toast);

    setTimeout(()=>{
        toast.remove();
    },3000);

}

</script>

</body>

</html>
